  # ─── Documents ───
  /documents:
    get:
      operationId: getAllDocuments
      summary: Retrieve documents
      description: Retrieve a paginated list of documents from your workspace.
      tags:
        - Documents
      parameters:
        - name: userId
          in: query
          schema:
            type: string
          description: Filter by user ID.
        - name: size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 50
          description: Maximum results per page.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number for pagination.
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - LAST_UPDATED
              - OLDEST_UPDATED
              - ALPHABETICAL
              - REVERSE_ALPHABETICAL
              - NEWEST_CREATED
              - OLDEST_CREATED
          description: Sort order for documents.
        - name: name
          in: query
          schema:
            type: string
          description: Filter documents by name.
        - name: statuses
          in: query
          schema:
            type: string
          description: Comma-separated list of statuses to filter by (DRAFT, PUBLISHED, IN_PROGRESS, IN_REVIEW, COMPLETED).
        - name: createdAtStart
          in: query
          schema:
            type: string
            format: date-time
          description: Start date filter (ISO format).
        - name: createdAtEnd
          in: query
          schema:
            type: string
            format: date-time
          description: End date filter (ISO format).
      responses:
        '200':
          description: Successfully retrieved documents.
          content:
